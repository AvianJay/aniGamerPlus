<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>aGP+ | 用戶管理</title>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./static/img/aniGamerPlus.ico" type="image/x-icon" />
    <script src="./static/js/jquery-3.4.0.min.js"></script>
    <script src="./static/js/popper.min.js"></script>
    <link rel="stylesheet" href="./static/css/bootstrap.rfs.min.css">
    <script src="./static/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="./static/css/fontawesome.all.min.css" />
    <link rel="stylesheet" href="./static/css/aniGamerPlus.css" />
    <script id="agp-dashboard-bootstrap" type="application/json">{{ dashboard_bootstrap|tojson }}</script>
    <script src="./static/js/userapi.js?v=2"></script>
    <style>
        .user-manage-wrapper {
            max-width: 1080px;
            margin: 0 auto;
            padding: 88px 16px 32px;
        }

        .user-manage-card {
            border: 1px solid #d7dde5;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            margin-bottom: 20px;
        }

        .user-manage-card .card-body {
            padding: 20px;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .table input,
        .table select {
            min-width: 120px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md bg-dark navbar-dark fixed-top">
        <a class="navbar-brand" href="/"><img src="./static/img/aniGamerPlus.ico"></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav"></ul>
        </div>
    </nav>

    <div class="user-manage-wrapper">
        <div class="user-manage-card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center flex-wrap">
                    <div>
                        <h1 class="h3 mb-2">用戶管理</h1>
                        <p class="text-muted mb-0">管理 admin / user 帳號，支援新增、編輯角色、重設密碼與刪除。</p>
                    </div>
                    <a class="btn btn-outline-secondary mt-3 mt-md-0" href="./control">返回控制面板</a>
                </div>
            </div>
        </div>

        <div class="user-manage-card">
            <div class="card-body">
                <h2 class="h5 mb-3">新增用戶</h2>
                <div class="form-row">
                    <div class="col-md-4 mb-2">
                        <input id="new-username" type="text" class="form-control" placeholder="使用者名稱">
                    </div>
                    <div class="col-md-4 mb-2">
                        <input id="new-password" type="password" class="form-control" placeholder="初始密碼">
                    </div>
                    <div class="col-md-2 mb-2">
                        <select id="new-role" class="form-control">
                            <option value="user">user</option>
                            <option value="admin">admin</option>
                        </select>
                    </div>
                    <div class="col-md-2 mb-2">
                        <button id="create-user-btn" class="btn btn-success btn-block" type="button">新增</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="user-manage-card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover table-sm mb-0">
                        <thead class="thead-dark">
                            <tr>
                                <th>帳號</th>
                                <th>角色</th>
                                <th>觀看紀錄</th>
                                <th>新密碼</th>
                                <th style="width: 220px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="userlist">
                            {% for user in users %}
                            <tr data-username="{{ user.username }}">
                                <td class="font-weight-bold">{{ user.username }}</td>
                                <td>
                                    <select class="form-control form-control-sm role-select">
                                        <option value="user" {% if user.role == 'user' %}selected{% endif %}>user</option>
                                        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>admin</option>
                                    </select>
                                </td>
                                <td>{{ user.videotimes|length }}</td>
                                <td>
                                    <input type="password" class="form-control form-control-sm password-input" placeholder="留空表示不變更">
                                </td>
                                <td>
                                    <div class="d-flex">
                                        <button type="button" class="btn btn-primary btn-sm mr-2 save-user-btn">儲存</button>
                                        <button type="button" class="btn btn-danger btn-sm delete-user-btn">刪除</button>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function postUserManage(payload) {
            return $.ajax({
                url: './usermanage',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload)
            });
        }

        function reloadUserManage() {
            window.location.reload();
        }

        $(document).on('click', '#create-user-btn', function () {
            const username = $('#new-username').val().trim();
            const password = $('#new-password').val();
            const role = $('#new-role').val();

            if (!username || !password) {
                alert('請輸入使用者名稱與初始密碼。');
                return;
            }

            postUserManage({
                action: 'add',
                username: username,
                password: password,
                role: role
            }).done(function (response) {
                alert(response.message || '已新增用戶');
                reloadUserManage();
            }).fail(function (xhr) {
                const response = xhr.responseJSON || {};
                alert(response.message || '新增失敗');
            });
        });

        $(document).on('click', '.save-user-btn', function () {
            const row = $(this).closest('tr');
            const username = row.data('username');
            const role = row.find('.role-select').val();
            const password = row.find('.password-input').val();

            postUserManage({
                action: 'change',
                username: username,
                role: role,
                password: password
            }).done(function (response) {
                alert(response.message || '已更新用戶');
                reloadUserManage();
            }).fail(function (xhr) {
                const response = xhr.responseJSON || {};
                alert(response.message || '更新失敗');
            });
        });

        $(document).on('click', '.delete-user-btn', function () {
            const row = $(this).closest('tr');
            const username = row.data('username');

            if (!confirm(`確定要刪除用戶 ${username} 嗎？`)) {
                return;
            }

            postUserManage({
                action: 'delete',
                username: username
            }).done(function (response) {
                alert(response.message || '已刪除用戶');
                reloadUserManage();
            }).fail(function (xhr) {
                const response = xhr.responseJSON || {};
                alert(response.message || '刪除失敗');
            });
        });
    </script>
</body>

</html>
